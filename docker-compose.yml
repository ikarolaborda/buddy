services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: buddy-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - QDRANT_HOST=http://qdrant-memory-db
      - QDRANT_PORT=6333
    networks:
      - qdrant-memory_default
    command: ["php", "artisan", "serve", "--host=0.0.0.0"]

  queue:
    image: buddy-app
    depends_on:
      - app
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - QDRANT_HOST=http://qdrant-memory-db
      - QDRANT_PORT=6333
    networks:
      - qdrant-memory_default
    command: ["php", "artisan", "queue:listen", "--tries=1", "--timeout=180"]

networks:
  qdrant-memory_default:
    external: true
