services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: buddy-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - buddy_db:/var/www/html/database
    env_file: .env
    environment:
      - QDRANT_HOST=http://qdrant-memory-db
      - QDRANT_PORT=6333
    networks:
      - qdrant-memory_default
    command: >
      sh -c "touch database/database.sqlite &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0"

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: buddy-app
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - buddy_db:/var/www/html/database
    env_file: .env
    environment:
      - QDRANT_HOST=http://qdrant-memory-db
      - QDRANT_PORT=6333
    networks:
      - qdrant-memory_default
    command: php artisan queue:listen --tries=1 --timeout=180

volumes:
  buddy_db:

networks:
  qdrant-memory_default:
    external: true
